<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumit Dwivedi | AI Engineer</title>

<!-- Fonts & Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #007BFF;
  --dark: #0f172a;
  --light: #f4f9ff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  overflow-x: hidden;
  cursor: none;
}

/* Particles background */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Custom Cursor */
.cursor {
  width: 15px;
  height: 15px;
  border: 2px solid #007BFF;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transition: 0.1s;
  z-index: 9999;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 10%;
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.toggle {
  cursor: pointer;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
}

.typing {
  color: var(--primary);
  border-right: 3px solid var(--primary);
  white-space: nowrap;
  overflow: hidden;
}

/* Sections */
section {
  padding: 80px 10%;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

h2 {
  color: var(--primary);
}

/* Skills */
.progress {
  background: #1e293b;
  border-radius: 20px;
  margin-bottom: 20px;
}

.progress-bar {
  height: 12px;
  width: 0;
  background: var(--primary);
  border-radius: 20px;
  transition: width 2s;
}

/* Projects */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.badge {
  display: inline-block;
  background: var(--primary);
  padding: 5px 10px;
  border-radius: 15px;
  font-size: 12px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 80%;
  max-width: 700px;
}

.modal img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="particles"></div>
<div class="cursor"></div>

<nav>
  <h3>Sumit Dwivedi</h3>
  <div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<div class="hero">
  <h1>Hello, I'm Sumit Dwivedi</h1>
  <h2 class="typing"></h2>
</div>

<section>
  <h2>Skills</h2>
  Python
  <div class="progress"><div class="progress-bar" data-width="92%"></div></div>
  Machine Learning
  <div class="progress"><div class="progress-bar" data-width="88%"></div></div>
  Deep Learning
  <div class="progress"><div class="progress-bar" data-width="85%"></div></div>
  LLM / GenAI
  <div class="progress"><div class="progress-bar" data-width="85%"></div></div>
</section>

<section>
  <h2>Projects</h2>

  <div class="projects">

    <div class="card" onclick="openModal()">
      <h3>Healthcare AI System</h3>
      <div id="repo-data"></div>
      <span class="badge">Deployed Ready</span>
      <p><i class="fab fa-python"></i> Python 
         <i class="fas fa-brain"></i> ML 
         <i class="fas fa-server"></i> FastAPI</p>
    </div>

  </div>
</section>

<!-- Modal -->
<div class="modal" id="projectModal">
  <div class="modal-content">
    <h3>Healthcare AI System</h3>
    <img src="https://raw.githubusercontent.com/sumitdwivedi0640/healthcare-ai-system/main/project-preview.png">
    <br><br>
    <a href="https://github.com/sumitdwivedi0640/healthcare-ai-system" target="_blank">
      View Full Repository →
    </a>
  </div>
</div>

<script>
/* Typing */
const text = "AI Engineer | ML | GenAI | LLM Systems";
let i=0;
function typing(){
  if(i<text.length){
    document.querySelector(".typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,70);
  }
}
typing();

/* Scroll reveal */
window.addEventListener("scroll",()=>{
  document.querySelectorAll("section").forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.classList.add("show");
    }
  });
});

/* Skills animation */
window.onload=()=>{
  document.querySelectorAll(".progress-bar").forEach(bar=>{
    bar.style.width=bar.getAttribute("data-width");
  });
};

/* Dark mode */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* Modal */
function openModal(){
  document.getElementById("projectModal").style.display="flex";
}
window.onclick=function(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display="none";
  }
};

/* GitHub Auto Fetch */
fetch("https://api.github.com/repos/sumitdwivedi0640/healthcare-ai-system")
.then(res=>res.json())
.then(data=>{
  document.getElementById("repo-data").innerHTML =
    `⭐ ${data.stargazers_count} | 🍴 ${data.forks_count}<br>${data.description}`;
});

/* Custom Cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* Particles */
const canvas=document.createElement("canvas");
document.getElementById("particles").appendChild(canvas);
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const ctx=canvas.getContext("2d");
let particles=[];
for(let i=0;i<80;i++){
  particles.push({x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2});
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#007BFF";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
